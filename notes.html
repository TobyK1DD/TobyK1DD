<body>
  <h1 style="text-align: center;">Super Simple Note Taking App</h1>
  <br>
 <div class="container">
    <input id="noteTitle" placeholder="Note title" />
<br><br>
<textarea id="noteInput" placeholder="Type your note..." rows="10" cols="50"></textarea>
<br>
<button onclick="saveNote()">Save Note</button>
<button onclick="clearNotes()">Clear Notes</button>

<h2>Saved Notes:</h2>
<div id="savedNotes"></div>
  
<!-- Modal -->
<div id="noteModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h3 id="modalTitle"></h3>
    <p id="modalText"></p>
  </div>
</div>
<script>
  const toggleBtn = document.getElementById("themeToggle");

  // Load saved theme on page load
  if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("darkmode");
  }

  toggleBtn.addEventListener("click", () => {
    document.body.classList.toggle("darkmode");

    // Save preference
    if (document.body.classList.contains("darkmode")) {
      localStorage.setItem("theme", "dark");
    } else {
      localStorage.setItem("theme", "light");
    }
  });
</script>
<script src="JavaNotes.js"></script>
</body>
