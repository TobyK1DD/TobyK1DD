<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anime Focus App</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        color: white;
        text-align: center;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        /* Anime background */
        background: url("https://images.unsplash.com/photo-1549880338-65ddcdfd017b") no-repeat center center/cover;
    }

    .container {
        background: rgba(0,0,0,0.6);
        padding: 30px;
        border-radius: 20px;
        backdrop-filter: blur(10px);
    }

    h1 {
        margin-bottom: 10px;
    }

    #timer {
        font-size: 60px;
        margin: 20px 0;
    }

    button {
        padding: 10px 20px;
        margin: 5px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 16px;
    }

    .start { background: #4CAF50; }
    .pause { background: #f39c12; }
    .reset { background: #e74c3c; }

    iframe {
        margin-top: 20px;
        border-radius: 10px;
    }
</style>
</head>

<body>

<div class="container">
    <h1>🎌 Anime Focus</h1>
    <div id="mode">Focus</div>
    <div id="timer">25:00</div>

    <button class="start" onclick="startTimer()">Start</button>
    <button class="pause" onclick="pauseTimer()">Pause</button>
    <button class="reset" onclick="resetTimer()">Reset</button>

    <!-- Lofi YouTube -->
   <iframe
  width="100%"
  height="250"
  src="https://www.youtube.com/embed/jfKfPfyJRdk"
  title="Lofi Focus Music"
  frameborder="0"
  allow="autoplay; encrypted-media; picture-in-picture"
  allowfullscreen>
</iframe>
</div>

<script>
let focusTime = 25 * 60;
let breakTime = 5 * 60;
let time = focusTime;
let timer;
let isRunning = false;
let isFocus = true;

function updateDisplay() {
    let minutes = Math.floor(time / 60);
    let seconds = time % 60;
    document.getElementById("timer").innerText =
        `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
}

function startTimer() {
    if (isRunning) return;

    isRunning = true;
    timer = setInterval(() => {
        time--;

        if (time <= 0) {
            clearInterval(timer);
            isRunning = false;

            if (isFocus) {
                isFocus = false;
                time = breakTime;
                document.getElementById("mode").innerText = "Break";
                alert("Break time!");
            } else {
                isFocus = true;
                time = focusTime;
                document.getElementById("mode").innerText = "Focus";
                alert("Back to focus!");
            }

            updateDisplay();
        }

        updateDisplay();
    }, 1000);
}

function pauseTimer() {
    clearInterval(timer);
    isRunning = false;
}

function resetTimer() {
    clearInterval(timer);
    isRunning = false;
    isFocus = true;
    time = focusTime;
    document.getElementById("mode").innerText = "Focus";
    updateDisplay();
}

updateDisplay();
</script>

</body>
</html>
