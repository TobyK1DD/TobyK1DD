<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TobyK1DD Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Sour+Gummy:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #aac0c9; --bg-soft: #c7eafb; --text: #000; --primary: #f6c14e;
  --border: #ffffff; --accent: #aac6d3; --btn-bg: #f6c14e; --btn-text: #000;
  --card: #ffffff; --card2: #e8f4fa; --code-bg: #1e1e2e; --code-text: #cdd6f4;
  --sidebar: #8fb5c0; --nav-h: 54px; --success: #4caf50; --danger: #e74c3c; --muted: #555;
}
body.dark {
  --bg: #121212; --bg-soft: #1e1e1e; --text: #fff; --primary: #f78af2;
  --border: #333; --accent: #2a2a2a; --btn-bg: #f78af2; --btn-text: #000;
  --card: #1e1e1e; --card2: #252525; --sidebar: #1a1a1a; --muted: #aaa;
}
body {
  font-family: 'Sour Gummy', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background .3s, color .3s;
}

/* ── NAV ── */
nav {
  background: var(--bg); border-bottom: 2px solid var(--border);
  padding: 0 16px; height: var(--nav-h);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.nav-brand { font-size: 22px; font-weight: 700; cursor: pointer; user-select: none; }
.nav-right { display: flex; align-items: center; gap: 10px; }
.btn {
  font-family: 'Sour Gummy', sans-serif; font-size: 14px;
  color: var(--btn-text); background: var(--btn-bg);
  border: 2px solid var(--border); padding: 7px 16px;
  border-radius: 8px; cursor: pointer; transition: all .2s; font-weight: 600;
}
.btn:hover { background: var(--bg); color: var(--text); }
.btn-ghost { background: transparent; color: var(--text); border: 2px solid var(--border); }
.btn-ghost:hover { background: var(--btn-bg); color: var(--btn-text); }
.dark-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--bg); border: 2px solid var(--border);
  cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
}

/* ── LAYOUT ── */
.app { display: flex; height: calc(100vh - var(--nav-h)); }
.sidebar {
  width: 260px; background: var(--sidebar);
  padding: 12px 8px; overflow-y: auto;
  flex-shrink: 0; border-right: 2px solid var(--border);
}
.main { flex: 1; overflow: auto; padding: 20px; }

/* ── SIDEBAR ── */
.module-group { margin-bottom: 8px; }
.module-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; padding: 6px 10px; color: var(--muted);
}
.lesson-btn {
  width: 100%; text-align: left; background: none; border: none;
  font-family: 'Sour Gummy', sans-serif; font-size: 13px;
  padding: 8px 12px; border-radius: 8px; cursor: pointer;
  color: var(--text); display: flex; align-items: center; gap: 8px;
  transition: background .15s;
}
.lesson-btn:hover { background: var(--btn-bg); color: var(--btn-text); }
.lesson-btn.active { background: var(--btn-bg); color: var(--btn-text); font-weight: 700; }
.lesson-btn.done .check { color: var(--success); }
.check { font-size: 12px; margin-left: auto; }
.progress-bar { height: 6px; background: var(--accent); border-radius: 4px; margin: 8px 12px; }
.progress-fill { height: 100%; background: var(--btn-bg); border-radius: 4px; transition: width .4s; }
.xp-bar-wrap { margin: 6px 12px 0; font-size: 11px; color: var(--muted); }

/* ── HOME ── */
.hero { text-align: center; padding: 40px 20px; max-width: 700px; margin: 0 auto; }
.hero h1 { font-size: 38px; margin-bottom: 12px; }
.hero p { font-size: 16px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
.course-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px; max-width: 900px; margin: 0 auto;
}
.course-card {
  background: var(--card); border: 2px solid var(--border);
  border-radius: 14px; padding: 20px; cursor: pointer;
  transition: transform .2s, box-shadow .2s; text-align: center;
}
.course-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,.15); }
.course-icon { font-size: 36px; margin-bottom: 10px; }
.course-card h3 { font-size: 16px; margin-bottom: 6px; }
.course-card p { font-size: 13px; color: var(--muted); }
.badge {
  display: inline-block; background: var(--btn-bg); color: var(--btn-text);
  font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-top: 8px;
}

/* ── LESSON ── */
.lesson-view { max-width: 960px; margin: 0 auto; }
.lesson-header { margin-bottom: 20px; }
.lesson-header h2 { font-size: 28px; margin-bottom: 6px; }
.lesson-header p { color: var(--muted); font-size: 15px; line-height: 1.6; }
.lesson-nav { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.tab-btn {
  font-family: 'Sour Gummy', sans-serif; font-size: 14px;
  padding: 8px 18px; border-radius: 8px; border: 2px solid var(--border);
  background: var(--card2); color: var(--text); cursor: pointer;
  font-weight: 600; transition: all .2s;
}
.tab-btn.active { background: var(--btn-bg); color: var(--btn-text); }
.tab-btn:hover:not(.active) { background: var(--bg-soft); }

/* ── CONTENT ── */
.content-section { display: none; }
.content-section.visible { display: block; }
.theory-box {
  background: var(--card); border: 2px solid var(--border);
  border-radius: 14px; padding: 24px; margin-bottom: 16px; line-height: 1.8;
}
.theory-box h3 { font-size: 18px; margin-bottom: 12px; color: var(--text); }
.theory-box p { font-size: 15px; color: var(--text); margin-bottom: 10px; }
.theory-box ul, .theory-box ol { margin-left: 20px; font-size: 15px; }
.theory-box li { margin-bottom: 6px; }
.theory-box code {
  background: var(--code-bg); color: #89b4fa;
  padding: 2px 6px; border-radius: 4px; font-family: 'Fira Code', monospace; font-size: 13px;
}
.highlight-box {
  background: var(--bg-soft); border-left: 4px solid var(--btn-bg);
  border-radius: 0 8px 8px 0; padding: 14px 16px; margin: 12px 0; font-size: 14px;
}

/* ── EDITOR ── */
.editor-layout {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px; min-height: 440px;
}
@media (max-width: 720px) { .editor-layout { grid-template-columns: 1fr; } }
.editor-panel {
  background: var(--code-bg); border-radius: 12px;
  overflow: hidden; display: flex; flex-direction: column;
}
.editor-toolbar {
  background: #11111b; padding: 8px 12px; font-size: 12px;
  color: #89b4fa; display: flex; align-items: center; justify-content: space-between;
  font-family: 'Fira Code', monospace;
}
.editor-tabs { display: flex; gap: 4px; }
.etab {
  padding: 4px 10px; border-radius: 6px 6px 0 0;
  background: #1e1e2e; color: #cdd6f4; font-size: 12px;
  cursor: pointer; font-family: 'Fira Code', monospace;
}
.etab.active { background: #313244; color: #89b4fa; }
textarea.code-input {
  flex: 1; background: #1e1e2e; color: #cdd6f4; border: none;
  padding: 16px; font-family: 'Fira Code', monospace; font-size: 13px;
  resize: none; line-height: 1.6; outline: none; tab-size: 2; min-height: 340px;
}
textarea.code-input::selection { background: #585b70; }
.preview-panel {
  background: var(--card); border-radius: 12px; overflow: hidden;
  border: 2px solid var(--border); display: flex; flex-direction: column;
}
.preview-toolbar {
  background: var(--card2); padding: 8px 12px; font-size: 13px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
iframe.preview { flex: 1; border: none; background: #fff; min-height: 340px; }
.run-btn {
  font-family: 'Sour Gummy', sans-serif; font-size: 13px;
  background: var(--success); color: #fff; border: none;
  padding: 6px 14px; border-radius: 8px; cursor: pointer; font-weight: 600;
}
.run-btn:hover { opacity: .85; }
.reset-btn {
  font-family: 'Sour Gummy', sans-serif; font-size: 13px;
  background: var(--card2); color: var(--text); border: 2px solid var(--border);
  padding: 6px 14px; border-radius: 8px; cursor: pointer; font-weight: 600;
}

/* ── QUIZ ── */
.quiz-box {
  background: var(--card); border: 2px solid var(--border);
  border-radius: 14px; padding: 24px; max-width: 700px;
}
.quiz-q { font-size: 16px; margin-bottom: 16px; font-weight: 600; line-height: 1.5; }
.quiz-options { display: flex; flex-direction: column; gap: 10px; }
.quiz-opt {
  background: var(--card2); border: 2px solid var(--border);
  border-radius: 10px; padding: 12px 16px; cursor: pointer;
  font-family: 'Sour Gummy', sans-serif; font-size: 15px;
  text-align: left; transition: all .2s; color: var(--text);
}
.quiz-opt:hover { background: var(--btn-bg); color: var(--btn-text); border-color: var(--btn-bg); }
.quiz-opt.correct { background: #d4edda; border-color: var(--success); color: #155724; }
.quiz-opt.wrong { background: #f8d7da; border-color: var(--danger); color: #721c24; }
.quiz-feedback {
  margin-top: 16px; padding: 12px 16px; border-radius: 10px; font-size: 15px; display: none;
}
.quiz-feedback.show { display: block; }
.quiz-feedback.ok { background: #d4edda; color: #155724; border: 1px solid var(--success); }
.quiz-feedback.bad { background: #f8d7da; color: #721c24; border: 1px solid var(--danger); }
.quiz-score { font-size: 18px; margin-top: 16px; font-weight: 700; }

/* ── PROJECT ── */
.project-box {
  background: var(--card); border: 2px solid var(--border);
  border-radius: 14px; padding: 24px; margin-bottom: 16px;
}
.project-box h3 { font-size: 20px; margin-bottom: 8px; }
.project-box p { font-size: 14px; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }
.checklist { list-style: none; margin-bottom: 16px; }
.checklist li {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; font-size: 15px; border-bottom: 1px solid var(--accent);
}
.checklist li:last-child { border-bottom: none; }
.checklist li input { width: 18px; height: 18px; cursor: pointer; accent-color: var(--btn-bg); }
.complete-btn {
  font-family: 'Sour Gummy', sans-serif; font-size: 15px;
  background: var(--success); color: #fff; border: none;
  padding: 10px 24px; border-radius: 10px; cursor: pointer; font-weight: 700;
}
.complete-btn:disabled { opacity: .5; cursor: not-allowed; }

/* ── AUTH MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.55); z-index: 999;
  justify-content: center; align-items: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card); border: 3px solid var(--border);
  border-radius: 18px; padding: 30px; width: 100%; max-width: 390px; position: relative;
}
.modal h2 { font-size: 24px; margin-bottom: 20px; text-align: center; }
.form-group { margin-bottom: 14px; }
.form-group label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 5px; color: var(--muted); }
.form-group input {
  width: 100%; padding: 10px 14px; border: 2px solid var(--border);
  border-radius: 10px; font-family: 'Sour Gummy', sans-serif; font-size: 15px;
  background: var(--card2); color: var(--text); outline: none; transition: border .2s;
}
.form-group input:focus { border-color: var(--btn-bg); }
.form-submit {
  width: 100%; padding: 12px;
  font-family: 'Sour Gummy', sans-serif; font-size: 16px; font-weight: 700;
  background: var(--btn-bg); color: var(--btn-text); border: 2px solid var(--border);
  border-radius: 10px; cursor: pointer; margin-top: 6px; transition: all .2s;
}
.form-submit:hover { opacity: .85; }
.form-switch { text-align: center; margin-top: 12px; font-size: 13px; }
.form-switch a {
  color: var(--btn-text); background: var(--btn-bg); padding: 2px 8px;
  border-radius: 6px; cursor: pointer; text-decoration: none; font-weight: 600;
}
.modal-close {
  position: absolute; top: 12px; right: 14px; font-size: 20px;
  cursor: pointer; background: none; border: none; color: var(--muted);
}
.error-msg { color: var(--danger); font-size: 13px; text-align: center; margin-top: 6px; display: none; }
.success-msg { color: var(--success); font-size: 13px; text-align: center; margin-top: 6px; display: none; }
.user-info { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; }
.avatar {
  width: 34px; height: 34px; border-radius: 50%; background: var(--btn-bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; border: 2px solid var(--border);
}
.forgot-link {
  font-size: 12px; text-align: right; margin-top: 4px;
  cursor: pointer; color: var(--muted); text-decoration: underline;
}

/* ── MISC ── */
.back-btn {
  font-family: 'Sour Gummy', sans-serif; font-size: 14px;
  background: var(--card2); color: var(--text); border: 2px solid var(--border);
  padding: 7px 16px; border-radius: 8px; cursor: pointer; margin-bottom: 16px; font-weight: 600;
}
.back-btn:hover { background: var(--btn-bg); color: var(--btn-text); }
.next-btn {
  font-family: 'Sour Gummy', sans-serif; font-size: 15px;
  background: var(--btn-bg); color: var(--btn-text); border: 2px solid var(--border);
  padding: 10px 28px; border-radius: 10px; cursor: pointer; font-weight: 700; margin-top: 16px;
}
.next-btn:hover { opacity: .85; }
.locked { opacity: .5; }
.terminal-box {
  background: #1e1e2e; color: #cdd6f4; padding: 20px; border-radius: 12px;
  font-family: 'Fira Code', monospace; font-size: 13px; line-height: 2; margin: 12px 0;
}
.t-cmd { color: #89b4fa; } .t-comment { color: #6c7086; } .t-out { color: #a6e3a1; }
.nav-lesson { display: flex; gap: 10px; margin-top: 24px; flex-wrap: wrap; }
</style>
</head>

<!-- ── NAVIGATION ── -->
<nav>
  <div class="nav-brand" onclick="goHome()">🎓 TobyK1DD Academy</div>

    </div>
</nav>

  

<!-- ── APP SHELL ── -->
<div class="app" id="app">
  <div class="sidebar" id="sidebar">
    <div class="xp-bar-wrap">Progress <span id="prog-pct">0%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    <div id="sidebar-content"></div>
  </div>
  <div class="main" id="main-area">
    <div id="view-home"></div>
    <div id="view-lesson" style="display:none"></div>
  </div>
</div>

<!-- ── AUTH MODAL ── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-inner"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
// CURRICULUM
// ════════════════════════════════════════════════════
const CURRICULUM = [
  {
    id: 'html', title: 'HTML', icon: '🌐', desc: 'Build the structure of web pages',
    lessons: [
      {
        id: 'html-1', title: 'What is HTML?',
        theory: `<h3>What is HTML?</h3>
          <p>HTML (HyperText Markup Language) is the skeleton of every web page. It tells the browser <strong>what</strong> content to display — headings, paragraphs, images, links, and more.</p>
          <p>HTML uses <strong>tags</strong> — special keywords wrapped in angle brackets. Most tags come in pairs: an opening tag and a closing tag.</p>
          <div class="highlight-box">💡 HTML is NOT a programming language — it's a <em>markup</em> language. It describes structure, not behaviour.</div>
          <h3 style="margin-top:16px">Basic Structure</h3>
          <p>Every HTML page follows this skeleton:</p>
          <ul>
            <li><code>&lt;!DOCTYPE html&gt;</code> — tells the browser this is HTML5</li>
            <li><code>&lt;html&gt;</code> — the root element wrapping everything</li>
            <li><code>&lt;head&gt;</code> — metadata (title, CSS links) — invisible to users</li>
            <li><code>&lt;body&gt;</code> — the visible content</li>
          </ul>`,
        starter: `<!DOCTYPE html>\n<html>\n  <head>\n    <title>My First Page</title>\n  </head>\n  <body>\n    <h1>Hello, World! 👋</h1>\n    <p>This is my first web page.</p>\n    <p>Change this text and click Run!</p>\n  </body>\n</html>`,
        quiz: { q: 'What does HTML stand for?', options: ['Hyper Transfer Markup Language','HyperText Markup Language','Hyper Text Making Language','High Text Markup Language'], correct: 1, explain: 'HTML = HyperText Markup Language — it marks up text with structure tags.' }
      },
      {
        id: 'html-2', title: 'Headings & Paragraphs',
        theory: `<h3>Headings & Paragraphs</h3>
          <p>HTML has 6 heading levels — <code>&lt;h1&gt;</code> to <code>&lt;h6&gt;</code>. <code>h1</code> is the biggest and most important. Use only one <code>h1</code> per page.</p>
          <p>The <code>&lt;p&gt;</code> tag wraps a paragraph of text. Browsers add space between paragraphs automatically.</p>
          <div class="highlight-box">✅ Use headings to <em>describe sections</em>, not just to make text big. Search engines use headings to understand your page.</div>
          <h3 style="margin-top:16px">Text Formatting</h3>
          <ul>
            <li><code>&lt;strong&gt;</code> — bold, important text</li>
            <li><code>&lt;em&gt;</code> — italic, emphasised text</li>
            <li><code>&lt;br&gt;</code> — line break (self-closing, no end tag needed)</li>
          </ul>`,
        starter: `<!DOCTYPE html>\n<html>\n<body>\n  <h1>My Blog 📝</h1>\n  <h2>About Me</h2>\n  <p>Hi! I'm learning HTML.</p>\n  <p>I'm <strong>really</strong> enjoying it so far.</p>\n\n  <h2>My Hobbies</h2>\n  <p>I love <em>coding</em> and building things.</p>\n\n  <!-- Try adding an h3 and more paragraphs! -->\n</body>\n</html>`,
        quiz: { q: 'How many h1 tags should a well-structured page have?', options: ['As many as you like','Two — one for title, one for content','Just one','Zero — h2 is better'], correct: 2, explain: 'Best practice: use exactly one h1 per page. It\'s the main topic/title of the entire page.' }
      },
      {
        id: 'html-3', title: 'Links & Images',
        theory: `<h3>Links</h3>
          <p>The <code>&lt;a&gt;</code> (anchor) tag creates hyperlinks. The <code>href</code> attribute sets the destination URL.</p>
          <div class="highlight-box">📌 Use <code>target="_blank"</code> to open links in a new tab. Always add <code>rel="noopener"</code> for security.</div>
          <h3 style="margin-top:16px">Images</h3>
          <p>The <code>&lt;img&gt;</code> tag embeds images. It's a <em>void element</em> — it doesn't need a closing tag.</p>
          <p>Key attributes:</p>
          <ul>
            <li><code>src</code> — the image URL or file path</li>
            <li><code>alt</code> — description for screen readers and broken images</li>
            <li><code>width</code> / <code>height</code> — size in pixels</li>
          </ul>`,
        starter: `<!DOCTYPE html>\n<html>\n<body>\n  <h1>My Links & Images Page</h1>\n\n  <p>Visit my favourite site:\n    <a href="https://developer.mozilla.org" target="_blank" rel="noopener">MDN Web Docs</a>\n  </p>\n\n  <h2>A Cool Image</h2>\n  <img src="https://picsum.photos/300/200" alt="Random photo" width="300">\n\n  <!-- Try changing the image size or adding more links! -->\n</body>\n</html>`,
        quiz: { q: 'What attribute does the <a> tag use to set the link destination?', options: ['src','link','href','url'], correct: 2, explain: 'The href (Hypertext REFerence) attribute specifies where the link goes.' }
      },
      {
        id: 'html-4', title: 'Lists & Tables',
        theory: `<h3>Lists</h3>
          <p><strong>Unordered lists</strong> (<code>&lt;ul&gt;</code>) show bullet points. <strong>Ordered lists</strong> (<code>&lt;ol&gt;</code>) show numbers. Both use <code>&lt;li&gt;</code> for each item.</p>
          <h3 style="margin-top:14px">Tables</h3>
          <p>Tables use a grid of rows and cells:</p>
          <ul>
            <li><code>&lt;table&gt;</code> — the container</li>
            <li><code>&lt;tr&gt;</code> — a table row</li>
            <li><code>&lt;th&gt;</code> — a header cell (bold by default)</li>
            <li><code>&lt;td&gt;</code> — a data cell</li>
          </ul>
          <div class="highlight-box">⚠️ Don't use tables for page layout! They're only for tabular data. Use CSS Flexbox or Grid for layout.</div>`,
        starter: `<!DOCTYPE html>\n<html>\n<body>\n  <h1>My Favourite Things</h1>\n\n  <ul>\n    <li>Pizza 🍕</li>\n    <li>Coding 💻</li>\n    <li>Music 🎵</li>\n  </ul>\n\n  <h2>Top 3 Films</h2>\n  <ol>\n    <li>Interstellar</li>\n    <li>The Matrix</li>\n    <li>Inception</li>\n  </ol>\n\n  <h2>My Schedule</h2>\n  <table border="1" cellpadding="6">\n    <tr><th>Day</th><th>Activity</th></tr>\n    <tr><td>Monday</td><td>HTML practice</td></tr>\n    <tr><td>Tuesday</td><td>CSS styling</td></tr>\n  </table>\n</body>\n</html>`,
        quiz: { q: 'Which tag creates an ordered (numbered) list?', options: ['<ul>','<li>','<ol>','<list>'], correct: 2, explain: '<ol> = Ordered List (numbers). <ul> = Unordered List (bullets). Both use <li> for items.' }
      },
      {
        id: 'html-5', title: 'Forms & Inputs',
        theory: `<h3>HTML Forms</h3>
          <p>Forms let users submit data. The <code>&lt;form&gt;</code> element wraps all inputs.</p>
          <p>Common input types:</p>
          <ul>
            <li><code>&lt;input type="text"&gt;</code> — single-line text</li>
            <li><code>&lt;input type="email"&gt;</code> — email (validates format)</li>
            <li><code>&lt;input type="password"&gt;</code> — hidden text</li>
            <li><code>&lt;input type="checkbox"&gt;</code> — tick box</li>
            <li><code>&lt;textarea&gt;</code> — multi-line text</li>
            <li><code>&lt;button type="submit"&gt;</code> — submits the form</li>
          </ul>
          <div class="highlight-box">📌 Always use a <code>&lt;label&gt;</code> for each input — it tells users what to type and improves accessibility.</div>`,
        starter: `<!DOCTYPE html>\n<html>\n<body>\n  <h1>Contact Me 📬</h1>\n\n  <form onsubmit="handleSubmit(event)">\n    <label for="name">Your Name:</label><br>\n    <input type="text" id="name" name="name" placeholder="John Doe"><br><br>\n\n    <label for="email">Email:</label><br>\n    <input type="email" id="email" name="email" placeholder="you@example.com"><br><br>\n\n    <label for="msg">Message:</label><br>\n    <textarea id="msg" rows="4" cols="40" placeholder="Write something..."></textarea><br><br>\n\n    <button type="submit">Send Message 🚀</button>\n  </form>\n\n  <p id="result"></p>\n\n  <script>\n    function handleSubmit(e) {\n      e.preventDefault();\n      const name = document.getElementById("name").value;\n      document.getElementById("result").textContent = "Thanks, " + name + "! Message sent ✅";\n    }\n  <\/script>\n</body>\n</html>`,
        quiz: { q: 'Which input type validates that the text is an email address?', options: ['type="text"','type="mail"','type="email"','type="address"'], correct: 2, explain: 'type="email" makes the browser check that the input matches a valid email format before submitting.' }
      },
      {
        id: 'html-project', title: '🏗️ Project: Personal Page', isProject: true,
        theory: `<h3>Project: Build Your Personal Page!</h3>
          <p>Put everything you've learned together to build a real personal webpage. This is your first project — make it yours! Use headings, paragraphs, lists, images, links, and a contact form.</p>`,
        starter: `<!DOCTYPE html>\n<html>\n<head>\n  <title>About Me</title>\n</head>\n<body>\n  <h1>Hi, I'm [Your Name]! 👋</h1>\n\n  <h2>About Me</h2>\n  <p>Write something about yourself here...</p>\n\n  <h2>My Hobbies</h2>\n  <ul>\n    <li>Add your hobbies...</li>\n  </ul>\n\n  <h2>My Favourite Links</h2>\n  <a href="#">Link 1</a> |\n  <a href="#">Link 2</a>\n\n  <br><br>\n  <img src="https://picsum.photos/400/200?random=1" alt="Banner" width="400">\n\n  <h2>Contact Me</h2>\n  <form>\n    <input type="email" placeholder="Your email"><br><br>\n    <textarea rows="3" placeholder="Your message"></textarea><br><br>\n    <button type="submit">Send</button>\n  </form>\n\n  <hr>\n  <p>Made with ❤️ by me</p>\n</body>\n</html>`,
        quiz: { q: '', options: [], correct: 0, explain: '' },
        checklist: ['Use an h1 with your name','Add at least 2 sections with h2 headings','Include a paragraph about yourself','Add an unordered list of hobbies','Add at least one working link','Include an image','Add a contact form']
      }
    ]
  },
  {
    id: 'css', title: 'CSS', icon: '🎨', desc: 'Style and design your web pages',
    lessons: [
      {
        id: 'css-1', title: 'Intro to CSS',
        theory: `<h3>What is CSS?</h3>
          <p>CSS (Cascading Style Sheets) controls how HTML looks — colours, fonts, spacing, layout. Without CSS, every website would be plain black text on white.</p>
          <p>You can add CSS three ways:</p>
          <ul>
            <li><strong>Inline</strong> — <code>style</code> attribute on one element</li>
            <li><strong>Internal</strong> — <code>&lt;style&gt;</code> tag in the <code>&lt;head&gt;</code></li>
            <li><strong>External</strong> — a separate <code>.css</code> file (best practice!)</li>
          </ul>
          <div class="highlight-box">📌 A CSS rule = <strong>selector { property: value; }</strong><br>Example: <code>h1 { color: blue; font-size: 32px; }</code></div>`,
        starter: `<!DOCTYPE html>\n<html>\n<head>\n<style>\n  body {\n    font-family: Arial, sans-serif;\n    background-color: #f0f8ff;\n    padding: 20px;\n  }\n\n  h1 {\n    color: #2c3e50;\n    font-size: 36px;\n  }\n\n  p {\n    color: #555;\n    line-height: 1.6;\n  }\n\n  /* Try changing the colours! */\n</style>\n</head>\n<body>\n  <h1>Styled Page 🎨</h1>\n  <p>This paragraph is styled with CSS!</p>\n  <p>Change the colors and see what happens.</p>\n</body>\n</html>`,
        quiz: { q: 'In CSS, what separates a property from its value?', options: ['= (equals)','a colon :','a semicolon ;','a comma ,'], correct: 1, explain: 'CSS syntax: property: value; — a colon separates the property from its value, and a semicolon ends each declaration.' }
      },
      {
        id: 'css-2', title: 'Selectors & Colours',
        theory: `<h3>CSS Selectors</h3>
          <ul>
            <li><strong>Tag</strong>: <code>p { }</code> — targets all &lt;p&gt; elements</li>
            <li><strong>Class</strong>: <code>.card { }</code> — targets elements with <code>class="card"</code></li>
            <li><strong>ID</strong>: <code>#hero { }</code> — targets the element with <code>id="hero"</code></li>
          </ul>
          <div class="highlight-box">✅ Use <strong>classes</strong> for most styling. IDs should be unique — use them sparingly, mostly for JavaScript.</div>
          <h3 style="margin-top:14px">Colours in CSS</h3>
          <ul>
            <li>Names: <code>red</code>, <code>blue</code>, <code>tomato</code></li>
            <li>Hex: <code>#f6c14e</code></li>
            <li>RGB: <code>rgb(246, 193, 78)</code></li>
            <li>HSL: <code>hsl(42, 90%, 63%)</code></li>
          </ul>`,
        starter: `<!DOCTYPE html>\n<html>\n<head>\n<style>\n  .card {\n    background: #f6c14e;\n    padding: 20px;\n    border-radius: 12px;\n    margin: 10px 0;\n    max-width: 300px;\n  }\n\n  .card.blue { background: #aac0c9; }\n  .card.pink { background: #f78af2; }\n\n  #special {\n    border: 3px solid #333;\n    font-weight: bold;\n  }\n</style>\n</head>\n<body>\n  <div class="card">Yellow Card ☀️</div>\n  <div class="card blue">Blue Card 💙</div>\n  <div class="card pink" id="special">Pink Special Card 💜</div>\n</body>\n</html>`,
        quiz: { q: 'Which CSS selector targets an element with class="box"?', options: ['#box','box','.box','*box'], correct: 2, explain: 'A dot (.) before the name selects by class. Hash (#) selects by ID. No prefix selects by tag name.' }
      },
      {
        id: 'css-3', title: 'Box Model & Spacing',
        theory: `<h3>The CSS Box Model</h3>
          <p>Every HTML element is a box! From inside out:</p>
          <ul>
            <li><strong>Content</strong> — the actual text or image</li>
            <li><strong>Padding</strong> — space inside the border (between content and border)</li>
            <li><strong>Border</strong> — the line around the box</li>
            <li><strong>Margin</strong> — space outside the border (between this element and others)</li>
          </ul>
          <div class="highlight-box">💡 Always add <code>* { box-sizing: border-box; }</code> to your CSS. It makes padding and borders not add extra size to elements — much easier to work with!</div>`,
        starter: `<!DOCTYPE html>\n<html>\n<head>\n<style>\n  * { box-sizing: border-box; }\n\n  .box {\n    background: #f6c14e;\n    width: 200px;\n    padding: 20px;\n    border: 4px solid #333;\n    margin: 20px;\n    border-radius: 8px;\n  }\n\n  .box2 {\n    background: #aac0c9;\n    width: 200px;\n    padding: 40px; /* more padding */\n    border: 4px solid #333;\n    margin: 20px;\n    border-radius: 8px;\n  }\n</style>\n</head>\n<body>\n  <div class="box">Small Padding</div>\n  <div class="box2">Big Padding</div>\n</body>\n</html>`,
        quiz: { q: 'Which CSS property adds space INSIDE an element (between content and border)?', options: ['margin','spacing','padding','gap'], correct: 2, explain: 'Padding = inside. Margin = outside. Remember: padding is the cushion inside the box, margin pushes other elements away.' }
      },
      {
        id: 'css-4', title: 'Flexbox Layout',
        theory: `<h3>CSS Flexbox</h3>
          <p>Flexbox makes it easy to arrange items in a row or column. Set <code>display: flex</code> on the <strong>parent</strong> container.</p>
          <p>Key properties on the parent:</p>
          <ul>
            <li><code>flex-direction</code>: <code>row</code> (default) or <code>column</code></li>
            <li><code>justify-content</code>: alignment along main axis — <code>center</code>, <code>space-between</code>, etc.</li>
            <li><code>align-items</code>: alignment along cross axis — <code>center</code>, <code>stretch</code>, etc.</li>
            <li><code>gap</code>: space between items</li>
            <li><code>flex-wrap: wrap</code>: let items wrap to next line</li>
          </ul>
          <div class="highlight-box">✅ Flexbox is perfect for navigation bars, card rows, and centering things on screen!</div>`,
        starter: `<!DOCTYPE html>\n<html>\n<head>\n<style>\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  body { font-family: Arial; padding: 20px; }\n\n  nav {\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    background: #2c3e50;\n    padding: 12px 20px;\n    border-radius: 10px;\n    margin-bottom: 20px;\n  }\n  nav a { color: white; text-decoration: none; margin: 0 10px; }\n\n  .cards {\n    display: flex;\n    gap: 16px;\n    flex-wrap: wrap;\n  }\n  .card {\n    background: #f6c14e;\n    padding: 20px;\n    border-radius: 12px;\n    flex: 1;\n    min-width: 120px;\n    text-align: center;\n  }\n</style>\n</head>\n<body>\n  <nav>\n    <strong style="color:white">MyApp</strong>\n    <div>\n      <a href="#">Home</a>\n      <a href="#">About</a>\n      <a href="#">Contact</a>\n    </div>\n  </nav>\n\n  <div class="cards">\n    <div class="card">Card 1 🌟</div>\n    <div class="card">Card 2 🎨</div>\n    <div class="card">Card 3 🚀</div>\n  </div>\n</body>\n</html>`,
        quiz: { q: 'Which CSS property do you set on the parent to make children flex?', options: ['flex: 1','flex-children: true','display: flex','align: flex'], correct: 2, explain: 'You set display: flex on the PARENT/container. The children automatically become flex items.' }
      },
      {
        id: 'css-5', title: 'CSS Variables & Themes',
        theory: `<h3>CSS Custom Properties (Variables)</h3>
          <p>CSS variables let you store values once and reuse them everywhere. Define them in <code>:root</code> (applies globally) and use with <code>var(--name)</code>.</p>
          <div class="highlight-box">💡 This is exactly how the TobyK1DD site works! The <code>:root</code> block sets light mode colours, and <code>body.dark</code> overrides them for dark mode.</div>
          <h3 style="margin-top:14px">Transitions</h3>
          <p>The <code>transition</code> property smoothly animates changes:</p>
          <ul>
            <li><code>transition: all 0.3s ease;</code> — animate all changes over 0.3 seconds</li>
            <li>Works great with <code>:hover</code> for button effects</li>
          </ul>`,
        starter: `<!DOCTYPE html>\n<html>\n<head>\n<style>\n  :root {\n    --bg: #aac0c9;\n    --primary: #f6c14e;\n    --text: #000;\n    --card: white;\n  }\n\n  body {\n    background: var(--bg);\n    color: var(--text);\n    font-family: Arial;\n    padding: 20px;\n    transition: all 0.3s;\n  }\n\n  .card {\n    background: var(--card);\n    padding: 20px;\n    border-radius: 12px;\n    margin-bottom: 16px;\n  }\n\n  button {\n    background: var(--primary);\n    border: 2px solid black;\n    padding: 10px 20px;\n    border-radius: 8px;\n    cursor: pointer;\n    font-size: 16px;\n    transition: transform 0.2s;\n  }\n  button:hover { transform: scale(1.05); }\n</style>\n</head>\n<body>\n  <div class="card">\n    <h2>CSS Variables Demo 🎨</h2>\n    <p>Click the button to switch themes!</p>\n  </div>\n  <button onclick="toggleTheme()">🌙 Toggle Dark Mode</button>\n\n  <script>\n    function toggleTheme() {\n      const root = document.documentElement;\n      const isDark = root.style.getPropertyValue('--bg') === '#121212';\n      root.style.setProperty('--bg', isDark ? '#aac0c9' : '#121212');\n      root.style.setProperty('--text', isDark ? '#000' : '#fff');\n      root.style.setProperty('--card', isDark ? 'white' : '#1e1e1e');\n    }\n  <\/script>\n</body>\n</html>`,
        quiz: { q: 'How do you USE a CSS variable called --primary-color?', options: ['primary-color','$(--primary-color)','var(--primary-color)','css(--primary-color)'], correct: 2, explain: 'CSS variables are accessed with the var() function: var(--variable-name). The -- prefix is required when defining them.' }
      },
      {
        id: 'css-project', title: '🎨 Project: Styled Portfolio', isProject: true,
        theory: `<h3>Project: Style Your Personal Page!</h3>
          <p>Take your HTML personal page from Module 1 and make it beautiful with CSS. Use everything you've learned: colours, box model, flexbox, and CSS variables.</p>`,
        starter: `<!DOCTYPE html>\n<html>\n<head>\n<style>\n  :root {\n    --bg: #aac0c9;\n    --primary: #f6c14e;\n    --text: #000;\n  }\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n\n  body {\n    font-family: Arial, sans-serif;\n    background: var(--bg);\n    color: var(--text);\n  }\n\n  header {\n    background: var(--primary);\n    padding: 40px 20px;\n    text-align: center;\n  }\n\n  nav {\n    display: flex;\n    justify-content: center;\n    gap: 12px;\n    background: #8fb5c0;\n    padding: 12px;\n  }\n\n  nav a {\n    background: white;\n    padding: 8px 16px;\n    border-radius: 8px;\n    text-decoration: none;\n    color: black;\n    font-weight: bold;\n    transition: all 0.2s;\n  }\n  nav a:hover { background: var(--primary); }\n\n  main {\n    max-width: 800px;\n    margin: 30px auto;\n    padding: 0 20px;\n  }\n\n  .card {\n    background: white;\n    border-radius: 14px;\n    padding: 20px;\n    margin: 20px 0;\n  }\n\n  /* ADD YOUR OWN STYLES BELOW! */\n\n</style>\n</head>\n<body>\n  <header>\n    <h1>My Portfolio 🌟</h1>\n    <p>Web Developer in Training</p>\n  </header>\n  <nav>\n    <a href="#">About</a>\n    <a href="#">Projects</a>\n    <a href="#">Contact</a>\n  </nav>\n  <main>\n    <div class="card">\n      <h2>About Me</h2>\n      <p>Customise this page to make it yours!</p>\n    </div>\n    <div class="card">\n      <h2>My Skills</h2>\n      <p>HTML ✅ CSS ✅ JavaScript 🔜</p>\n    </div>\n  </main>\n</body>\n</html>`,
        quiz: { q: '', options: [], correct: 0, explain: '' },
        checklist: ['Add a styled navigation bar using flexbox','Use at least 3 different colours','Use CSS variables for your main colours','Add padding and margin for good spacing','Style at least one element using a CSS class','Add hover effects to buttons or links']
      }
    ]
  },
  {
    id: 'js', title: 'JavaScript', icon: '⚡', desc: 'Add interactivity and logic',
    lessons: [
      {
        id: 'js-1', title: 'Variables & Data Types',
        theory: `<h3>Variables</h3>
          <p>Variables store data. In modern JavaScript, use <code>let</code> (can change) or <code>const</code> (can't change).</p>
          <div class="highlight-box">🚫 Avoid using <code>var</code> — it has confusing scoping rules. Use <code>let</code> and <code>const</code> instead.</div>
          <h3 style="margin-top:14px">Data Types</h3>
          <ul>
            <li><strong>String</strong>: text — <code>"hello"</code> or <code>'hello'</code> or <code>\`hello\`</code></li>
            <li><strong>Number</strong>: any number — <code>42</code> or <code>3.14</code></li>
            <li><strong>Boolean</strong>: <code>true</code> or <code>false</code></li>
            <li><strong>Array</strong>: list of values — <code>[1, 2, 3]</code></li>
            <li><strong>Object</strong>: key-value pairs — <code>{ name: "Toby", age: 20 }</code></li>
            <li><strong>null / undefined</strong>: intentionally empty / not yet assigned</li>
          </ul>`,
        starter: `<!DOCTYPE html>\n<html>\n<body>\n<script>\n  // Variables\n  const name = "Toby";\n  let age = 20;\n  const isLearning = true;\n  const hobbies = ["coding", "music", "gaming"];\n  const person = { name: "Toby", age: 20 };\n\n  // Template literals (backtick strings)\n  const message = \`Hello, \${name}! You are \${age} years old.\`;\n\n  // Show on page\n  document.body.innerHTML = \`\n    <h1>Hello, \${name}!</h1>\n    <p>Age: \${age}</p>\n    <p>Learning: \${isLearning}</p>\n    <p>Hobbies: \${hobbies.join(", ")}</p>\n    <p>Message: \${message}</p>\n  \`;\n<\/script>\n</body>\n</html>`,
        quiz: { q: 'Which keyword creates a variable that CANNOT be reassigned?', options: ['let','var','const','fixed'], correct: 2, explain: 'const = constant — the value cannot be reassigned. let = can be changed. var = old way, avoid it.' }
      },
      {
        id: 'js-2', title: 'Functions & Events',
        theory: `<h3>Functions</h3>
          <p>Functions are reusable blocks of code. Define once, call many times.</p>
          <ul>
            <li><strong>Traditional</strong>: <code>function greet(name) { return "Hello " + name; }</code></li>
            <li><strong>Arrow function</strong>: <code>const greet = (name) => "Hello " + name;</code></li>
          </ul>
          <div class="highlight-box">💡 Arrow functions are shorter and are the modern way to write functions in JavaScript.</div>
          <h3 style="margin-top:14px">DOM Events</h3>
          <p>The DOM (Document Object Model) is the page's structure. JavaScript can listen for and react to events:</p>
          <ul>
            <li><code>onclick="fn()"</code> — inline click handler</li>
            <li><code>element.addEventListener('click', fn)</code> — best practice</li>
            <li><code>document.getElementById('id')</code> — find an element</li>
            <li><code>element.textContent = 'new text'</code> — change text</li>
          </ul>`,
        starter: `<!DOCTYPE html>\n<html>\n<head>\n<style>\n  body { font-family: Arial; padding: 20px; text-align: center; }\n  button { padding: 12px 24px; font-size: 16px; cursor: pointer;\n           background: #f6c14e; border: 2px solid #333; border-radius: 8px; margin: 5px; }\n  #output { font-size: 48px; margin: 20px; min-height: 60px; }\n  #count  { font-size: 20px; color: #555; }\n</style>\n</head>\n<body>\n  <h1>Click Counter 🖱️</h1>\n  <div id="output">0</div>\n  <div id="count">clicks</div>\n  <button onclick="increment()">➕ Add</button>\n  <button onclick="decrement()">➖ Minus</button>\n  <button onclick="reset()">🔄 Reset</button>\n\n<script>\n  let count = 0;\n\n  function updateDisplay() {\n    document.getElementById('output').textContent = count;\n  }\n\n  function increment() { count++; updateDisplay(); }\n  function decrement() { count--; updateDisplay(); }\n  function reset()     { count = 0; updateDisplay(); }\n<\/script>\n</body>\n</html>`,
        quiz: { q: 'What does document.getElementById("myBtn") do?', options: ['Creates a new button','Finds the element with id="myBtn"','Deletes the element','Changes the button text'], correct: 1, explain: 'getElementById searches the page for an element with that specific id and returns it, so you can modify it.' }
      },
      {
        id: 'js-3', title: 'Arrays & Loops',
        theory: `<h3>Arrays</h3>
          <p>Arrays store ordered lists of values. Access items by index (starting at 0).</p>
          <ul>
            <li><code>arr.push(item)</code> — add to end</li>
            <li><code>arr.pop()</code> — remove from end</li>
            <li><code>arr.filter(fn)</code> — keep only matching items</li>
            <li><code>arr.map(fn)</code> — transform each item</li>
          </ul>
          <h3 style="margin-top:14px">Loops</h3>
          <ul>
            <li><code>for (let i = 0; i &lt; arr.length; i++)</code> — classic loop</li>
            <li><code>arr.forEach(item => ...)</code> — cleaner for arrays</li>
            <li><code>arr.map(item => ...)</code> — transform & return new array</li>
          </ul>
          <div class="highlight-box">✅ Prefer <code>map()</code>, <code>filter()</code>, <code>forEach()</code> — they're more readable than classic <code>for</code> loops.</div>`,
        starter: `<!DOCTYPE html>\n<html>\n<head>\n<style>\n  body { font-family: Arial; padding: 20px; background: #f0f8ff; }\n  li { padding: 6px 0; font-size: 16px; }\n  input { padding: 8px; font-size: 16px; border-radius: 6px; border: 2px solid #ccc; width: 60%; }\n  button { padding: 8px 16px; font-size: 16px; background: #f6c14e;\n           border: 2px solid #333; border-radius: 6px; cursor: pointer; margin-left: 6px; }\n  .del { background: #e74c3c; color: white; border-color: #e74c3c; }\n</style>\n</head>\n<body>\n  <h1>My Todo List ✅</h1>\n  <input type="text" id="taskInput" placeholder="Add a task..." onkeydown="if(event.key==='Enter')addTask()">\n  <button onclick="addTask()">Add</button>\n  <ul id="taskList"></ul>\n\n<script>\n  const tasks = ["Learn HTML", "Learn CSS"];\n\n  function render() {\n    document.getElementById('taskList').innerHTML =\n      tasks.map((task, i) =>\n        \`<li>📌 \${task} <button class="del" onclick="deleteTask(\${i})">✕</button></li>\`\n      ).join('');\n  }\n\n  function addTask() {\n    const input = document.getElementById('taskInput');\n    if (input.value.trim()) {\n      tasks.push(input.value.trim());\n      input.value = '';\n      render();\n    }\n  }\n\n  function deleteTask(i) {\n    tasks.splice(i, 1);\n    render();\n  }\n\n  render();\n<\/script>\n</body>\n</html>`,
        quiz: { q: 'What does the array .map() method do?', options: ['Finds items matching a condition','Transforms each item and returns a new array','Adds an item to the end','Removes duplicate items'], correct: 1, explain: '.map() loops over each item, applies a function to it, and returns a NEW array with the transformed values. The original array is unchanged.' }
      },
      {
        id: 'js-4', title: 'localStorage & JSON',
        theory: `<h3>localStorage</h3>
          <p>localStorage lets you save data in the browser — it persists even after the page is closed or refreshed. Perfect for saving user preferences and app data.</p>
          <ul>
            <li><code>localStorage.setItem('key', value)</code> — save a string</li>
            <li><code>localStorage.getItem('key')</code> — read a value</li>

        starter: `<!DOCTYPE html>\n<html>\n<head>\n<style>\n  body { font-family: Arial; padding: 20px; }\n  input { padding: 8px; font-size: 16px; border-radius: 6px; border: 2px solid #ccc; }\n  button { padding: 8px 16px; font-size: 16px; background: #f6c14e;\n           border: 2px solid #333; border-radius: 6px; cursor: pointer; margin-left: 6px; }\n  .note { background: #fff9e6; border: 1px solid #f6c14e; border-radius: 8px;\n          padding: 12px; margin: 8px 0; font-size: 15px; }\n</style>\n</head>\n<body>\n  <h1>Saved Notes 💾</h1>\n  <p style="color:#555;font-size:14px">Notes are saved in your browser — refresh the page and they stay!</p>\n  <input type="text" id="inp" placeholder="Type a note...">\n  <button onclick="addNote()">Save</button>\n  <button onclick="clearAll()">Clear All</button>\n  <div id="notes"></div>\n\n<script>\n  function getNotes() {\n    return JSON.parse(localStorage.getItem('my-notes') || '[]');\n  }\n\n  function saveNotes(notes) {\n    localStorage.setItem('my-notes', JSON.stringify(notes));\n  }\n\n  function render() {\n    const notes = getNotes();\n    document.getElementById('notes').innerHTML = notes.length\n      ? notes.map(n => \`<div class="note">📌 \${n}</div>\`).join('')\n      : '<p style="color:#999">No notes yet!</p>';\n  }\n\n  function addNote() {\n    const val = document.getElementById('inp').value.trim();\n    if (!val) return;\n    const notes = getNotes();\n    notes.push(val);\n    saveNotes(notes);\n    document.getElementById('inp').value = '';\n    render();\n  }\n\n  function clearAll() {\n    localStorage.removeItem('my-notes');\n    render();\n  }\n\n  render();\n<\/script>\n</body>\n</html>`,

        starter: `<!DOCTYPE html>\n<html>\n<head>\n<style>\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  body { font-family: Arial; background: #aac0c9; min-height: 100vh; padding: 20px; }\n  .container { max-width: 640px; margin: 0 auto; }\n  h1 { text-align: center; margin-bottom: 20px; font-size: 32px; }\n  .add-box { background: white; border-radius: 14px; padding: 20px; margin-bottom: 20px; }\n  textarea { width: 100%; height: 80px; padding: 10px; font-size: 15px;\n             border: 2px solid #ccc; border-radius: 8px; resize: none; font-family: Arial; }\n  .add-btn { width: 100%; padding: 12px; background: #f6c14e; border: 2px solid #333;\n             border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }\n  .note { background: white; border-radius: 14px; padding: 16px; margin: 10px 0;\n          display: flex; justify-content: space-between; align-items: flex-start;\n          box-shadow: 0 2px 6px rgba(0,0,0,.08); }\n  .note-text { flex: 1; font-size: 15px; line-height: 1.5; }\n  .del-btn { background: #e74c3c; color: white; border: none; border-radius: 6px;\n             padding: 6px 12px; cursor: pointer; margin-left: 10px; font-size: 13px; flex-shrink: 0; }\n  .empty { text-align: center; color: #555; padding: 30px; font-size: 16px; }\n  .stats { text-align: center; color: #555; font-size: 13px; margin-bottom: 10px; }\n</style>\n</head>\n<body>\n<div class="container">\n  <h1>My Notes 📒</h1>\n  <div class="stats" id="stats"></div>\n  <div class="add-box">\n    <textarea id="noteText" placeholder="Write a note and click Save..."></textarea>\n    <button class="add-btn" onclick="addNote()">+ Save Note</button>\n  </div>\n  <div id="notes-list"></div>\n</div>\n\n<script>\n  function getNotes() {\n    return JSON.parse(localStorage.getItem('notes-app') || '[]');\n  }\n\n  function saveNotes(notes) {\n    localStorage.setItem('notes-app', JSON.stringify(notes));\n  }\n\n  function addNote() {\n    const text = document.getElementById('noteText').value.trim();\n    if (!text) return;\n    const notes = getNotes();\n    notes.unshift({ id: Date.now(), text, date: new Date().toLocaleDateString() });\n    saveNotes(notes);\n    document.getElementById('noteText').value = '';\n    render();\n  }\n\n  function deleteNote(id) {\n    const notes = getNotes().filter(n => n.id !== id);\n    saveNotes(notes);\n    render();\n  }\n\n  function render() {\n    const notes = getNotes();\n    document.getElementById('stats').textContent = notes.length + ' note' + (notes.length !== 1 ? 's' : '') + ' saved';\n    const list = document.getElementById('notes-list');\n    if (notes.length === 0) {\n      list.innerHTML = '<div class="empty">No notes yet! Add one above. 📝</div>';\n      return;\n    }\n    list.innerHTML = notes.map(n => \`\n      <div class="note">\n        <div class="note-text">\n          <div style="font-size:11px;color:#999;margin-bottom:4px">\${n.date}</div>\n          \${n.text.replace(/\\n/g, '<br>')}\n        </div>\n        <button class="del-btn" onclick="deleteNote(\${n.id})">Delete</button>\n      </div>\n    \`).join('');\n  }\n\n  render();\n<\/script>\n</body>\n</html>`,

    id: 'git', title: 'Git & GitHub', icon: '🐙', desc: 'Version control and collaboration',
    lessons: [
      {
        id: 'git-1', title: 'What is Git?',
        theory: `<h3>What is Git?</h3>
          <p>Git is a <strong>version control system</strong> — it tracks changes to your code over time. Think of it like "save points" in a video game. If something breaks, you can roll back to an earlier version.</p>
          <h3 style="margin-top:14px">Key Concepts</h3>
          <ul>
            <li><strong>Repository (repo)</strong> — a folder tracked by Git</li>
            <li><strong>Commit</strong> — a snapshot of your code at a point in time</li>
            <li><strong>Branch</strong> — a parallel version of your code</li>
            <li><strong>Remote</strong> — a copy of your repo hosted online (e.g. GitHub)</li>
          </ul>
          <div class="highlight-box">🐙 <strong>GitHub</strong> is a website that hosts Git repositories. Git is the tool; GitHub is the platform. They are different things!</div>
          <h3 style="margin-top:14px">Essential Commands</h3>
          <ul>
            <li><code>git init</code> — create a new repo in the current folder</li>
            <li><code>git add .</code> — stage all changed files for commit</li>
            <li><code>git commit -m "message"</code> — save a snapshot with a description</li>
            <li><code>git push</code> — upload commits to GitHub</li>
            <li><code>git pull</code> — download the latest changes from GitHub</li>
            <li><code>git status</code> — see what files have changed</li>
            <li><code>git log --oneline</code> — see commit history</li>
          </ul>`,
        starter: `<!DOCTYPE html>\n<html>\n<head>\n<style>\n  body { font-family: Arial; padding: 20px; background: #f0ffe8; }\n  .terminal { background: #1e1e2e; color: #cdd6f4; padding: 20px; border-radius: 12px;\n              font-family: 'Courier New', monospace; font-size: 13px; line-height: 2; }\n  .cmd { color: #89b4fa; } .comment { color: #6c7086; } .output { color: #a6e3a1; }\n  h2 { margin: 16px 0 8px; }\n</style>\n</head>\n<body>\n  <h1>Git Workflow 🐙</h1>\n  <h2>Starting a new project:</h2>\n  <div class="terminal">\n    <span class="comment"># Navigate to your project folder</span><br>\n    <span class="cmd">$ cd my-project</span><br><br>\n    <span class="comment"># Initialise Git in this folder</span><br>\n    <span class="cmd">$ git init</span><br>\n    <span class="output">Initialised empty Git repository in .git/</span><br><br>\n    <span class="comment"># Stage all files</span><br>\n    <span class="cmd">$ git add .</span><br><br>\n    <span class="comment"># Commit with a message</span><br>\n    <span class="cmd">$ git commit -m "Initial commit"</span><br>\n    <span class="output">[main (root-commit)] Initial commit</span><br>\n    <span class="output">3 files changed, 47 insertions(+)</span>\n  </div>\n  <h2>Connecting to GitHub:</h2>\n  <div class="terminal">\n    <span class="comment"># Add your GitHub repo as the remote origin</span><br>\n    <span class="cmd">$ git remote add origin https://github.com/username/my-project.git</span><br><br>\n    <span class="comment"># Push to GitHub for the first time</span><br>\n    <span class="cmd">$ git push -u origin main</span><br>\n    <span class="output">Branch 'main' set up to track 'origin/main'.</span>\n  </div>\n  <p style="margin-top:16px;color:#555;font-size:14px">📌 Practice these commands in VS Code's integrated terminal!</p>\n</body>\n</html>`,
        quiz: { q: 'What does "git commit" do?', options: ['Uploads code to GitHub','Saves a snapshot of your changes locally','Deletes a file','Creates a new branch'], correct: 1, explain: 'git commit saves a snapshot of your staged changes to your LOCAL repo history. git push then uploads those commits to GitHub.' }
      },
      {
        id: 'git-2', title: 'Branches & Pull Requests',
        theory: `<h3>Branches</h3>
          <p>Branches let you work on features without touching the main working code. The default branch is called <code>main</code>.</p>
          <div class="highlight-box">✅ Best practice: never commit directly to <code>main</code>. Create a feature branch, do your work, then merge via a Pull Request on GitHub.</div>
          <h3 style="margin-top:14px">Pull Requests (PRs)</h3>
          <p>A Pull Request on GitHub is a request to merge your branch into <code>main</code>. It lets team members review your code before it's merged.</p>
          <p>Workflow: <code>feature-branch</code> → push → PR on GitHub → review → merge to <code>main</code></p>
          <h3 style="margin-top:14px">Branch Commands</h3>
          <ul>
            <li><code>git checkout -b feature-name</code> — create and switch to a new branch</li>
            <li><code>git checkout main</code> — switch back to main</li>
            <li><code>git merge feature-name</code> — merge branch into current branch</li>
            <li><code>git branch -d feature-name</code> — delete branch after merging</li>
            <li><code>git branch</code> — list all branches</li>
          </ul>`,
        starter: `<!DOCTYPE html>\n<html>\n<head>\n<style>\n  body { font-family: Arial; padding: 20px; background: #f0ffe8; }\n  .flow { display: flex; gap: 8px; align-items: center; margin: 16px 0; flex-wrap: wrap; }\n  .step { background: white; border: 2px solid #4caf50; border-radius: 10px;\n          padding: 12px 16px; font-size: 13px; text-align: center; min-width: 110px; }\n  .arrow { font-size: 20px; color: #4caf50; }\n  .terminal { background: #1e1e2e; color: #cdd6f4; padding: 16px; border-radius: 10px;\n              font-family: monospace; font-size: 13px; line-height: 1.9; margin: 12px 0; }\n  .cmd { color: #89b4fa; } .output { color: #a6e3a1; }\n</style>\n</head>\n<body>\n  <h1>Branching Workflow 🌿</h1>\n  <div class="flow">\n    <div class="step">🌱 main</div>\n    <div class="arrow">→</div>\n    <div class="step">🌿 New branch</div>\n    <div class="arrow">→</div>\n    <div class="step">✍️ Commits</div>\n    <div class="arrow">→</div>\n    <div class="step">📤 Push</div>\n    <div class="arrow">→</div>\n    <div class="step">🔀 Open PR</div>\n    <div class="arrow">→</div>\n    <div class="step">✅ Merge</div>\n  </div>\n  <div class="terminal">\n    <span class="cmd"># Create and switch to feature branch</span><br>\n    <span class="cmd">$ git checkout -b add-contact-page</span><br>\n    <span class="output">Switched to a new branch 'add-contact-page'</span><br><br>\n    <span class="cmd"># Make changes, then stage and commit</span><br>\n    <span class="cmd">$ git add .</span><br>\n    <span class="cmd">$ git commit -m "Add contact page with form"</span><br><br>\n    <span class="cmd"># Push branch to GitHub</span><br>\n    <span class="cmd">$ git push origin add-contact-page</span><br>\n    <span class="output"># Now go to GitHub.com and click "Compare & pull request"!</span>\n  </div>\n</body>\n</html>`,
        quiz: { q: 'What is a Pull Request on GitHub?', options: ['Downloading code from GitHub','A request to merge your branch into main','A way to delete a branch','Cloning a repository'], correct: 1, explain: 'A Pull Request asks the repo maintainer to "pull" (merge) your branch changes into main. It enables code review before merging.' }
      },

// STATE MANAGEMENT
// ════════════════════════════════════════════════════
let state = { user: null, darkMode: false, currentLesson: null, currentTab: 'theory', completed: [], quizAnswered: null };

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem('academy_state') || '{}');
    state.completed = s.completed || [];
    state.user = s.user || null;
    state.darkMode = s.darkMode || false;
  } catch(e) {}
}

function saveState() {
  localStorage.setItem('academy_state', JSON.stringify({ completed: state.completed, user: state.user, darkMode: state.darkMode }));
}

function getUsers() {
  try { return JSON.parse(localStorage.getItem('academy_users') || '[]'); } catch(e) { return []; }
}
function saveUsers(u) { localStorage.setItem('academy_users', JSON.stringify(u)); }

function getAllLessons() { return CURRICULUM.flatMap(m => m.lessons); }

// ════════════════════════════════════════════════════
// DARK MODE
// ════════════════════════════════════════════════════
function toggleDark() {
  state.darkMode = !state.darkMode;
  document.body.classList.toggle('dark', state.darkMode);
  saveState();
}

// AUTH
// ════════════════════════════════════════════════════
function openModal(type) {
  document.getElementById('modal-overlay').classList.add('open');
  renderModal(type);
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function renderModal(type) {
  const inner = document.getElementById('modal-inner');
  if (type === 'login') {
    inner.innerHTML = `
      <h2>Welcome back 👋</h2>
      <div class="form-group"><label>Username</label><input type="text" id="auth-user" placeholder="your username"></div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="auth-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
        <div class="forgot-link" onclick="renderModal('forgot')">Forgot password?</div>
      </div>
      <div class="error-msg" id="auth-error"></div>
      <button class="form-submit" onclick="doLogin()">Login</button>
      <div class="form-switch">No account? <a onclick="renderModal('signup')">Sign Up Free</a></div>`;
  } else if (type === 'signup') {
    inner.innerHTML = `
      <h2>Create Account 🎓</h2>
      <div class="form-group"><label>Email</label><input type="email" id="su-email" placeholder="you@email.com"></div>
      <div class="form-group"><label>Username</label><input type="text" id="su-user" placeholder="choose a username"></div>
      <div class="form-group"><label>Password</label><input type="password" id="su-pass" placeholder="min 6 characters" onkeydown="if(event.key==='Enter')doSignup()"></div>
      <div class="error-msg" id="auth-error"></div>
      <div class="success-msg" id="auth-success"></div>
      <button class="form-submit" onclick="doSignup()">Create Account</button>
      <div class="form-switch">Have an account? <a onclick="renderModal('login')">Login</a></div>`;
  } else if (type === 'forgot') {
    inner.innerHTML = `
      <h2>Reset Password 🔑</h2>
      <p style="font-size:14px;color:var(--muted);margin-bottom:16px;line-height:1.5">Enter your email address and we'll send a reset link.</p>
      <div class="form-group"><label>Email</label><input type="email" id="reset-email" placeholder="you@email.com"></div>
      <div class="error-msg" id="auth-error"></div>
      <div class="success-msg" id="auth-success"></div>
      <button class="form-submit" onclick="doReset()">Send Reset Link</button>
      <div class="form-switch"><a onclick="renderModal('login')">← Back to Login</a></div>`;
  }
}

function showError(msg) { const el = document.getElementById('auth-error'); if(el){el.style.display='block';el.textContent=msg;} }
function showSuccess(msg) { const el = document.getElementById('auth-success'); if(el){el.style.display='block';el.textContent=msg;} }

function doLogin() {
  const u = document.getElementById('auth-user').value.trim();
  const p = document.getElementById('auth-pass').value;
  if(!u||!p){showError('Please fill in all fields');return;}
  const users = getUsers();
  const user = users.find(x => x.username===u && x.password===p);
  if(!user){showError('Incorrect username or password');return;}
  state.user = { username: u, email: user.email };
  saveState(); closeModal(); renderNav(); renderSidebar();
}

function doSignup() {
  const e = document.getElementById('su-email').value.trim();
  const u = document.getElementById('su-user').value.trim();
  const p = document.getElementById('su-pass').value;
  if(!e||!u||!p){showError('Please fill in all fields');return;}
  if(p.length<6){showError('Password must be at least 6 characters');return;}
  if(!/^[^@]+@[^@]+\.[^@]+$/.test(e)){showError('Please enter a valid email');return;}
  const users = getUsers();
  if(users.find(x=>x.username===u)){showError('Username already taken — try another');return;}
  users.push({username:u,email:e,password:p});
  saveUsers(users);
  state.user = {username:u,email:e};
  saveState(); closeModal(); renderNav(); renderSidebar();
}

function doReset() {
  const e = document.getElementById('reset-email').value.trim();
  if(!e){showError('Please enter your email');return;}
  const users = getUsers();
  if(!users.find(x=>x.email===e)){showError('No account found with that email address');return;}
  showSuccess('✅ Reset link sent to ' + e + ' (simulated — remember your username & password)');
}

function doLogout() {
  state.user = null; saveState(); renderNav(); renderSidebar();
}

// NAV
// ════════════════════════════════════════════════════
function renderNav() {
  const nr = document.getElementById('nav-right');
  if (state.user) {
    nr.innerHTML = `
      <div class="user-info">
        <div class="avatar">${state.user.username[0].toUpperCase()}</div>
        <span>${state.user.username}</span>
      </div>
      <button class="btn btn-ghost" onclick="doLogout()">Logout</button>
      <button class="dark-btn" onclick="toggleDark()">🌙</button>`;
  } else {
    nr.innerHTML = `
      <button class="btn btn-ghost" onclick="openModal('login')">Login</button>
      <button class="btn" onclick="openModal('signup')">Sign Up</button>
      <button class="dark-btn" onclick="toggleDark()">🌙</button>`;
  }
}

// SIDEBAR
// ════════════════════════════════════════════════════
function renderSidebar() {
  const total = getAllLessons().length;
  const done  = state.completed.length;
  const pct   = Math.round((done/total)*100);
  document.getElementById('prog-pct').textContent  = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';

  document.getElementById('sidebar-content').innerHTML = CURRICULUM.map(mod => `
    <div class="module-group">
      <div class="module-title">${mod.icon} ${mod.title}</div>
      ${mod.lessons.map(l => {
        const isDone   = state.completed.includes(l.id);
        const isActive = state.currentLesson && state.currentLesson.id === l.id;
        const isLocked = !state.user && mod.id !== 'html';
        return `<button class="lesson-btn ${isActive?'active':''} ${isDone?'done':''} ${isLocked?'locked':''}"
          onclick="${isLocked ? "openModal('login')" : "openLesson('"+l.id+"')"}"
          title="${isLocked?'Login to unlock all modules':''}">
          ${l.title}
          ${isLocked ? '<span class="check">🔒</span>' : isDone ? '<span class="check">✓</span>' : ''}
        </button>`;
      }).join('')}
    </div>`).join('');
}

function openLesson(lessonId) {
  const lesson = getAllLessons().find(l => l.id === lessonId);
  if (!lesson) return;
  const mod = CURRICULUM.find(m => m.lessons.find(l => l.id === lessonId));
  if (!state.user && mod.id !== 'html') { openModal('login'); return; }
  state.currentLesson = lesson;
  state.currentTab    = 'theory';
  state.quizAnswered  = null;
  document.getElementById('view-home').style.display   = 'none';
  document.getElementById('view-lesson').style.display = 'block';
  renderLesson(); renderSidebar();
}

  const l = state.currentLesson;

  const next    = idx < lessons.length-1 ? lessons[idx+1] : null;
  const modIdx  = CURRICULUM.findIndex(m => m.id === mod.id);
  const nextMod = !next && modIdx < CURRICULUM.length-1 ? CURRICULUM[modIdx+1].lessons[0] : null;

  const hasQuiz    = l.quiz && l.quiz.q;
  const isProject  = l.isProject;

  document.getElementById('view-lesson').innerHTML = `

      </div>

        <button class="tab-btn ${state.currentTab==='theory' ?'active':''}" onclick="switchTab('theory')">📖 Learn</button>

        ${hasQuiz   ? `<button class="tab-btn ${state.currentTab==='quiz'   ?'active':''}" onclick="switchTab('quiz')">🧪 Quiz</button>` : ''}
        ${isProject ? `<button class="tab-btn ${state.currentTab==='project'?'active':''}" onclick="switchTab('project')">🏗️ Project</button>` : ''}
      </div>

      <!-- THEORY -->

        <div class="theory-box">${l.theory}</div>
        <button class="next-btn" onclick="switchTab('editor')">Try it out →</button>
      </div>

      <!-- EDITOR -->
      <div class="content-section ${state.currentTab==='editor'?'visible':''}" id="sec-editor">
        <div class="editor-layout">
          <div class="editor-panel">
            <div class="editor-toolbar">
              <div class="editor-tabs"><div class="etab active">index.html</div></div>
              <span style="color:#6c7086;font-size:11px">Edit & Run</span>
            </div>
            <textarea class="code-input" id="code-editor" spellcheck="false">${escHtml(l.starter)}</textarea>
            <div style="background:#11111b;padding:8px 12px;display:flex;gap:8px">
              <button class="run-btn" onclick="runCode()">▶ Run</button>
              <button class="reset-btn" onclick="resetCode()">↺ Reset</button>
            </div>
          </div>
          <div class="preview-panel">
            <div class="preview-toolbar">
              <span style="font-weight:600">Live Preview</span>
              <span id="preview-status" style="font-size:12px;color:var(--muted)">Click Run to update</span>
            </div>
            <iframe class="preview" id="preview-frame" sandbox="allow-scripts allow-same-origin"></iframe>
          </div>
        </div>
        ${hasQuiz   ? `<button class="next-btn" onclick="switchTab('quiz')" style="margin-top:16px">Take the Quiz →</button>` : ''}
        ${isProject ? `<button class="next-btn" onclick="switchTab('project')" style="margin-top:16px">Go to Project Checklist →</button>` : ''}
      </div>

      <!-- QUIZ -->
      ${hasQuiz ? `
      <div class="content-section ${state.currentTab==='quiz'?'visible':''}" id="sec-quiz">
        <div class="quiz-box">
          <div class="quiz-q">${l.quiz.q}</div>
          <div class="quiz-options">
            ${l.quiz.options.map((opt,i) => `<button class="quiz-opt" id="qopt-${i}" onclick="answerQuiz(${i})">${opt}</button>`).join('')}
          </div>
          <div class="quiz-feedback" id="quiz-feedback"></div>
        </div>
        ${isDone ? `<div class="quiz-score">✅ Lesson complete! ${next||nextMod ? '' : '🎉 Module finished!'}</div>` : ''}
      </div>` : ''}

      <!-- PROJECT -->
      ${isProject ? `
      <div class="content-section ${state.currentTab==='project'?'visible':''}" id="sec-project">
        <div class="project-box">
          <h3>Project Checklist ✅</h3>
          <p>Tick off each task as you complete it in the editor. When all are done, mark the project complete!</p>
          <ul class="checklist" id="proj-checklist">
            ${l.checklist.map((item,i) => `
              <li><input type="checkbox" id="pc-${i}" onchange="checkProject()"> <label for="pc-${i}">${item}</label></li>
            `).join('')}
          </ul>
          <button class="complete-btn" id="proj-complete" onclick="completeProject()" disabled>✅ Mark Project as Complete</button>
        </div>
        ${isDone ? `<div class="quiz-score">✅ Project complete! ${next||nextMod ? '' : '🎉 Module finished!'}</div>` : ''}
      </div>` : ''}

      <!-- LESSON NAVIGATION -->
      <div class="nav-lesson">
        ${prev    ? `<button class="btn btn-ghost" onclick="openLesson('${prev.id}')">← ${prev.title}</button>` : ''}
        ${next    ? `<button class="btn" onclick="openLesson('${next.id}')">${next.title} →</button>` : ''}
        ${nextMod ? `<button class="btn" onclick="openLesson('${nextMod.id}')">Next Module: ${nextMod.title} →</button>` : ''}
      </div>
    </div>`;

  setTimeout(runCode, 80);
  if (state.quizAnswered !== null) highlightQuiz(state.quizAnswered, l);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function switchTab(tab) {
  state.currentTab = tab;
  renderLesson();
}

function runCode() {
  const editor = document.getElementById('code-editor');
  const frame  = document.getElementById('preview-frame');
  const status = document.getElementById('preview-status');
  if (!editor || !frame) return;
  frame.srcdoc = editor.value;
  if (status) status.textContent = '✅ Updated';
}

function resetCode() {
  const editor = document.getElementById('code-editor');
  if (editor && state.currentLesson) { editor.value = state.currentLesson.starter; runCode(); }
}

function answerQuiz(chosen) {
  if (state.quizAnswered !== null) return;
  state.quizAnswered = chosen;
  highlightQuiz(chosen, state.currentLesson);
}

function highlightQuiz(chosen, l) {
  const opts = document.querySelectorAll('.quiz-opt');
  const fb   = document.getElementById('quiz-feedback');
  if (!opts.length || !fb) return;
  const correct = l.quiz.correct;
  opts.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correct) btn.classList.add('correct');
    if (i === chosen && chosen !== correct) btn.classList.add('wrong');
  });
  fb.classList.add('show');
  if (chosen === correct) {
    fb.classList.add('ok');
    fb.innerHTML = '✅ Correct! ' + l.quiz.explain;
    markComplete(l.id);
  } else {
    fb.classList.add('bad');
    fb.innerHTML = '❌ Not quite. ' + l.quiz.explain;
  }
  renderSidebar();
}

function markComplete(lessonId) {
  if (!state.completed.includes(lessonId)) {
    state.completed.push(lessonId);
    saveState();
  }
}

function checkProject() {
  const boxes = document.querySelectorAll('[id^="pc-"]');
  const allDone = [...boxes].every(cb => cb.checked);
  const btn = document.getElementById('proj-complete');
  if (btn) btn.disabled = !allDone;
}

function completeProject() {
  markComplete(state.currentLesson.id);
  renderLesson(); renderSidebar();
}

// ════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════
loadState();
if (state.darkMode) document.body.classList.add('dark');
renderNav();
renderHome();
renderSidebar();

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
